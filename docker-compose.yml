services:
  api:
    build: .
    container_name: demo-api
    ports:
      - "5000:8080"
    depends_on:
      postgres:
          condition: service_healthy
    environment:
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=demo_db;Username=thien;Password=123456 

  postgres:
    image: postgres:16
    container_name: demo-postgres
    environment:
      POSTGRES_USER: thien
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: demo_db
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
     - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U thien -d demo_db"]
      internal: 5s
      timeout: 5s
      retries: 5
volumes:
  postgres-data:

  
     